spring:
  application:
    name: syllabussync
  
  profiles:
    active: development
  
  datasource:
    # Use H2 for development (free, embedded database)
    url: jdbc:h2:mem:syllabussync;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    # Uncomment for PostgreSQL in production
    # url: jdbc:postgresql://localhost:5432/syllabussync
    # username: syllabussync
    # password: syllabussync_password
    # driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  flyway:
    enabled: false
    
  sql:
    init:
      mode: never
  
# Google OAuth2 configuration
# Get these from Google Cloud Console:
# 1. Go to https://console.cloud.google.com/
# 2. Create a new project or select existing
# 3. Enable Google Calendar API
# 4. Create OAuth 2.0 credentials
# 5. Add the same URI under OAuth client "Authorized redirect URIs" in Google Cloud Console
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/syllabus/auth/google/callback}
  
  # Gemini: use Vertex AI (GCP credits) when GOOGLE_CLOUD_PROJECT is set; else consumer API with GEMINI_API_KEY
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    max-tokens: 4096
  vertex:
    project-id: ${GOOGLE_CLOUD_PROJECT:}
    location: ${VERTEX_AI_LOCATION:us-central1}
    # Optional: GCP API key (Credentials → API key, restricted to Vertex AI). Uses key= on the request; no OAuth needed.
    api-key: ${VERTEX_API_KEY:${GOOGLE_API_KEY:}}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:1800000} # 30 minutes in milliseconds
  
  mail:
    # Using free Gmail SMTP (requires app password)
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  cache:
    type: simple  # Using simple cache instead of Redis
    # Redis configuration (optional for production)
    # type: redis
    # redis:
    #   host: ${REDIS_HOST:localhost}
    #   port: ${REDIS_PORT:6379}
    #   password: ${REDIS_PASSWORD:}
    #   timeout: 2000ms
    #   lettuce:
    #     pool:
    #       max-active: 8
    #       max-idle: 8
    #       min-idle: 0

# Server configuration
server:
  address: 0.0.0.0
  port: ${PORT:8080}
  servlet:
    context-path: /
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# Logging configuration
logging:
  level:
    com.syllabussync: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:./logs/syllabussync.log}

# Application specific configuration
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000 # 24 hours
  
  file:
    upload-dir: ${UPLOAD_DIR:./uploads}
    max-size: ${MAX_FILE_SIZE:10MB}
    allowed-types: pdf,docx,txt
  
  google:
    calendar:
      timezone: America/New_York
      # Browser redirect after Google OAuth (Calendar page in the React app)
      oauth-success-redirect: ${CALENDAR_OAUTH_SUCCESS_URL:http://localhost:3000/calendar}
      default-reminders:
        - days: 7
        - days: 3
        - days: 1
  
  syllabus:
    parsing:
      timeout: 30000 # 30 seconds
      max-file-size: 10485760 # 10MB
      supported-formats: pdf,docx,txt
  
  notification:
    email:
      enabled: true
      from: ${MAIL_FROM:noreply@syllabussync.com}
      subject-prefix: [SyllabusSync]
    reminder:
      enabled: true
      default-days: 7,3,1

---
# Development profile
spring:
  config:
    activate:
      on-profile: development
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true

logging:
  level:
    com.syllabussync: DEBUG
    org.springframework.web: DEBUG

---
# Production profile
spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: false

logging:
  level:
    com.syllabussync: INFO
    org.springframework: WARN
    org.hibernate: WARN

---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker
  
  datasource:
    url: jdbc:postgresql://postgres:5432/syllabussync
    username: syllabussync
    password: ${POSTGRES_PASSWORD:syllabussync_password}
  
  cache:
    redis:
      host: redis
      port: 6379
